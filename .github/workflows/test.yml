name: Github Test Action
on: [pull_request]
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}

    strategy:
      matrix:
        operating-system: ['ubuntu-latest'] #, 'windows-latest', 'macros-latest'
        php-versions: ['8.4'] #, '8.5'
        include:
          - operating-system: 'ubuntu-latest'
            php-versions: '8.4'

    steps:
      - name: Clone Repo
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: simplexml, xdebug
          coverage: xdebug
          tools: phpunit:13.0
